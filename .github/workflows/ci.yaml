name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      # make check runs the same gate the local pre-push hook runs:
      # gofumpt (strict) + go vet + race-enabled tests + build.
      # Keep this single line in CI so local and CI never drift.
      - name: make check
        run: make check
